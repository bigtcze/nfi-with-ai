---

x-common-settings:
  &common-settings
  image: freqtradeorg/freqtrade:stable
  build:
    context: .
    dockerfile: "./docker/Dockerfile.custom"
  restart: unless-stopped
  volumes:
    - "./user_data:/freqtrade/user_data"
    - "./user_data/data:/freqtrade/user_data/data"
    - "./configs:/freqtrade/configs"
    - "./NostalgiaForInfinityX7.py:/freqtrade/NostalgiaForInfinityX7.py"
    - "./nfi_with_veto.py:/freqtrade/nfi_with_veto.py"
    - "./llm_reviewer.py:/freqtrade/llm_reviewer.py"
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:${FREQTRADE__API_SERVER__LISTEN_PORT:-8080}"]
    interval: 1m30s
    timeout: 10s
    retries: 3
    start_period: 40s
    start_interval: 5s
  env_file:
    - path: .env
      required: false

services:
  freqtrade:
    <<: *common-settings
    container_name: ${FREQTRADE__BOT_NAME:-Example_Test_Account}_${FREQTRADE__EXCHANGE__NAME:-binance}_${FREQTRADE__TRADING_MODE:-spot}-${FREQTRADE__STRATEGY:-NFIWithVeto}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${FREQTRADE__API_SERVER__LISTEN_PORT:-8080}:${FREQTRADE__API_SERVER__LISTEN_PORT:-8080}"
    command: >
      trade
      --db-url sqlite:////freqtrade/user_data/${FREQTRADE__BOT_NAME:-Example_Test_Account}_${FREQTRADE__EXCHANGE__NAME:-binance}_${FREQTRADE__TRADING_MODE:-spot}-tradesv3.sqlite
      --log-file user_data/logs/${FREQTRADE__BOT_NAME:-Example_Test_Account}-${FREQTRADE__EXCHANGE__NAME:-binance}-${FREQTRADE__STRATEGY:-NFIWithVeto}-${FREQTRADE__TRADING_MODE:-spot}.log
      --strategy-path .
      -v

  nfi-updater:
    image: nfi-updater:latest
    build:
      context: .
      dockerfile: "./docker/Dockerfile.updater"
    restart: unless-stopped
    depends_on:
      - freqtrade
    volumes:
      - ".:/data"
      - "/var/run/docker.sock:/var/run/docker.sock"
    env_file:
      - path: .env
        required: false
    environment:
      STRATEGY: NostalgiaForInfinityX7
      EXCHANGE: ${FREQTRADE__EXCHANGE__NAME:-binance}
      NFI_UPDATE_CRON: ${NFI_UPDATE_CRON:-0 10 * * *}
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-nfiwithai}
